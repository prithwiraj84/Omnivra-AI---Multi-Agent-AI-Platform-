# Auto-sync the `backend/` folder to a Hugging Face Docker Space on every change.
#
# It mirrors the CONTENTS of backend/ to the Space repo ROOT (so the Dockerfile + README
# frontmatter land at the top, which is what HF requires), handling adds, edits AND deletions,
# then pushes — which triggers a Space rebuild.
#
# ── One-time setup (GitHub → repo → Settings → Secrets and variables → Actions) ──
#   • Secret   HF_TOKEN     = a Hugging Face access token with WRITE access to the Space
#                            (https://huggingface.co/settings/tokens)
#   • Variable HF_SPACE_ID  = "<user-or-org>/<space-name>"  e.g.  yourname/omnivra-backend
#   The Space must already exist (SDK: Docker). Create it once at https://huggingface.co/new-space.
name: Sync backend to Hugging Face Space

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/sync-backend-to-hf.yml"
  workflow_dispatch: {}

# Never run two syncs at once — a second push mid-sync would race the Space's HEAD.
concurrency:
  group: hf-space-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      HF_SPACE_ID: ${{ vars.HF_SPACE_ID }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4

      - name: Validate config
        run: |
          if [ -z "$HF_SPACE_ID" ]; then
            echo "::error::Set the repo VARIABLE HF_SPACE_ID to '<user>/<space>' (Settings → Variables)."; exit 1
          fi
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::Set the repo SECRET HF_TOKEN to a Hugging Face write token."; exit 1
          fi
          case "$HF_SPACE_ID" in */*) : ;; *) echo "::error::HF_SPACE_ID must look like '<user>/<space>'."; exit 1 ;; esac

      - name: Clone the Space repo
        run: |
          git lfs install
          HF_USER="${HF_SPACE_ID%%/*}"
          # GitHub masks the secret in logs; the cloned credential lives only on this ephemeral runner.
          git clone "https://${HF_USER}:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_ID}" space

      - name: Mirror backend/ into the Space (adds, edits, deletions)
        run: |
          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.gitattributes' \
            --exclude='.venv/' --exclude='venv/' --exclude='env/' \
            --exclude='__pycache__/' --exclude='**/__pycache__/' \
            --exclude='*.pyc' --exclude='*.pyo' \
            --exclude='.env' --exclude='.env.local' \
            --exclude='.pytest_cache/' --exclude='.mypy_cache/' --exclude='.ruff_cache/' \
            backend/ space/

      - name: Commit & push (rebuilds the Space)
        run: |
          cd space
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No backend changes to sync."
          else
            git commit -m "Sync backend from ${{ github.repository }}@${{ github.sha }}"
            git push
            echo "Pushed → https://huggingface.co/spaces/${HF_SPACE_ID} (Space is rebuilding)." >> "$GITHUB_STEP_SUMMARY"
          fi
